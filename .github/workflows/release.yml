name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  dist:
    # Shared dist pipeline (.github/workflows/dist.yml, same one ci.yml runs
    # per push), stamped with the tag instead of ci-<sha12>.
    uses: ./.github/workflows/dist.yml
    permissions:
      contents: read
    with:
      version: ${{ github.ref_name }}
      bench: true

  publish:
    name: publish release
    needs: [dist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/ci
      - uses: actions/download-artifact@v7
        with:
          path: dl
      - name: collect + combine checksums
        run: |
          set -eux
          mkdir -p out
          find dl -type f ! -name 'checksums-*.txt' -exec cp {} out/ \;
          mcc-ci sha256sums dl --out out/SHA256SUMS.txt
          ls -l out
      - name: publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
