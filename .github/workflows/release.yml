name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  dist-unix:
    name: ${{ matrix.plat }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    plat: gcc-linux-x86_64,    preset: dist-linux-gcc }
          - { os: ubuntu-24.04-arm, plat: gcc-linux-arm64,     preset: dist-linux-gcc }
          - { os: ubuntu-latest,    plat: clang-linux-x86_64,  preset: dist-linux-clang }
          - { os: ubuntu-24.04-arm, plat: clang-linux-arm64,   preset: dist-linux-clang }
          - { os: macos-15,         plat: clang-macos-arm64,   preset: dist-macos }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build gcc clang
      - name: install toolchain (macos)
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja
      - name: configure + build + install
        run: |
          set -eux
          cmake --preset ${{ matrix.preset }}
          cmake --build --preset ${{ matrix.preset }} -j"$(getconf _NPROCESSORS_ONLN)"
          cmake --install cmake-build-${{ matrix.preset }}
          if [ "${{ runner.os }}" = macOS ]; then
            strip -x stage/bin/mcc stage/bin/mcc-* 2>/dev/null || true
          fi
      - name: package
        run: cmake "-DVER=${{ github.ref_name }}" "-DPLAT=${{ matrix.plat }}" -P cmake/package.cmake
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.plat }}
          path: out/*

  dist-windows:
    name: ${{ matrix.plat }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: windows-latest, plat: msvc-windows-x86_64 }
          - { runner: windows-11-arm, plat: msvc-windows-arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - name: configure + build + install
        run: |
          cmake --preset dist-msvc
          cmake --build --preset dist-msvc -j
          cmake --install cmake-build-dist-msvc --config Release
      - name: package
        run: cmake "-DVER=${{ github.ref_name }}" "-DPLAT=${{ matrix.plat }}" -P cmake/package.cmake
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.plat }}
          path: out/*

  dist-mingw:
    name: mingw-windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: install ninja
        run: choco install ninja -y
      - name: configure + build + install (superbuild fetches winlibs GCC)
        run: |
          cmake --preset dist-mingw
          cmake --build --preset dist-mingw -j
          cmake --install cmake-build-dist-mingw
      - name: package
        run: cmake "-DVER=${{ github.ref_name }}" "-DPLAT=mingw-windows-x86_64" -P cmake/package.cmake
      - uses: actions/upload-artifact@v7
        with:
          name: release-mingw-windows-x86_64
          path: out/*

  publish:
    name: publish release
    needs: [dist-unix, dist-windows, dist-mingw]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          path: dl
      - name: collect + combine checksums
        run: |
          set -eux
          # merge via the in-tree tool (PLAN 0.9 #3): recursive checksums-*.txt
          # concatenation, single source of truth with the rest of the CI logic.
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          mkdir -p out
          find dl -type f ! -name 'checksums-*.txt' -exec cp {} out/ \;
          /tmp/mcc-ci sha256sums dl --out out/SHA256SUMS.txt
          ls -l out
      - name: publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
