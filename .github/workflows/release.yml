name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  dist-unix:
    name: ${{ matrix.plat }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    plat: linux-x86_64-gcc,    preset: dist-linux-gcc }
          - { os: ubuntu-24.04-arm, plat: linux-arm64-gcc,     preset: dist-linux-gcc }
          - { os: ubuntu-latest,    plat: linux-x86_64-clang,  preset: dist-linux-clang }
          - { os: ubuntu-24.04-arm, plat: linux-arm64-clang,   preset: dist-linux-clang }
          - { os: macos-15,         plat: macos-arm64-clang,   preset: dist-macos }
          - { os: macos-15,         plat: macos-x86_64-clang,  preset: dist-macos, rosetta: true }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build gcc clang
      - name: install Rosetta 2 (run x86_64 binaries on Apple silicon)
        if: matrix.rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: install toolchain (macos)
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja
      - name: configure + build + install
        run: |
          set -eux
          extra=""
          if [ "${{ matrix.rosetta }}" = "true" ]; then
            extra="-DCMAKE_OSX_ARCHITECTURES=x86_64 -DMCC_TARGET_ARCH=x86_64"
          fi
          cmake --preset ${{ matrix.preset }} \
            "-DMCC_DIST_VERSION=${{ github.ref_name }}" "-DMCC_DIST_PLAT=${{ matrix.plat }}" \
            -DMCC_BENCH=ON $extra
          cmake --build --preset ${{ matrix.preset }} -j"$(getconf _NPROCESSORS_ONLN)"
          cmake --install cmake-${{ matrix.preset }}
          if [ "${{ runner.os }}" = macOS ]; then
            strip -x dist/bin/mcc dist/bin/mcc-* 2>/dev/null || true
          fi
      - name: benchmark
        run: cmake --build --preset ${{ matrix.preset }} --target bench
      - name: package
        run: cmake --build --preset ${{ matrix.preset }} --target package-dist
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.plat }}
          path: |
            dist/*.tar.xz
            dist/checksums-*.txt

  dist-windows:
    name: ${{ matrix.plat }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: windows-latest, plat: windows-x86_64-msvc }
          - { runner: windows-11-arm, plat: windows-arm64-msvc }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - name: configure + build + install
        run: |
          cmake --preset dist-msvc "-DMCC_DIST_VERSION=${{ github.ref_name }}" "-DMCC_DIST_PLAT=${{ matrix.plat }}" "-DMCC_BENCH=ON"
          cmake --build --preset dist-msvc -j
          cmake --install cmake-dist-msvc --config Release
      - name: benchmark
        run: cmake --build --preset dist-msvc --config Release --target bench
      - name: package
        run: cmake --build --preset dist-msvc --target package-dist
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.plat }}
          path: |
            dist/*.zip
            dist/checksums-*.txt

  dist-mingw:
    name: windows-x86_64-mingw
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: install ninja
        run: choco install ninja -y
      - name: configure + build + install (superbuild fetches winlibs GCC)
        run: |
          cmake --preset dist-mingw "-DMCC_DIST_VERSION=${{ github.ref_name }}" "-DMCC_DIST_PLAT=windows-x86_64-mingw" "-DMCC_BENCH=ON"
          cmake --build --preset dist-mingw -j
          cmake --install cmake-dist-mingw
      - name: benchmark
        run: cmake --build --preset dist-mingw --target bench
      - name: package
        run: cmake --build --preset dist-mingw --target package-dist
      - uses: actions/upload-artifact@v7
        with:
          name: release-windows-x86_64-mingw
          path: |
            dist/*.zip
            dist/checksums-*.txt

  publish:
    name: publish release
    needs: [dist-unix, dist-windows, dist-mingw]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          path: dl
      - name: collect + combine checksums
        run: |
          set -eux
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          mkdir -p out
          find dl -type f ! -name 'checksums-*.txt' -exec cp {} out/ \;
          /tmp/mcc-ci sha256sums dl --out out/SHA256SUMS.txt
          ls -l out
      - name: publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
