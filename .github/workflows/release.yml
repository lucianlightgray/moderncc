name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  dist-unix:
    name: ${{ matrix.plat }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    plat: linux-x86_64-gcc,    preset: dist-linux-gcc }
          - { os: ubuntu-24.04-arm, plat: linux-arm64-gcc,     preset: dist-linux-gcc }
          - { os: ubuntu-latest,    plat: linux-x86_64-clang,  preset: dist-linux-clang }
          - { os: ubuntu-24.04-arm, plat: linux-arm64-clang,   preset: dist-linux-clang }
          - { os: macos-15,         plat: macos-arm64-clang,   preset: dist-macos }
          - { os: macos-15,         plat: macos-x86_64-clang,  preset: dist-macos, rosetta: true }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build gcc clang
      - name: install Rosetta 2 (run x86_64 binaries on Apple silicon)
        if: matrix.rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: install toolchain (macos)
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja
      - name: build ci tool
        run: cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c $([ "$RUNNER_OS" = Linux ] && echo -ldl)
      - name: dist (configure + build + install + strip + bench + package)
        # `ci dist` runs the whole release.yml dist flow (the macOS local-symbol
        # strip is folded in); Rosetta's cross flags pass through after `--`.
        run: |
          set -eux
          extra=""
          if [ "${{ matrix.rosetta }}" = "true" ]; then
            extra="-- -DCMAKE_OSX_ARCHITECTURES=x86_64 -DMCC_TARGET_ARCH=x86_64"
          fi
          /tmp/mcc-ci dist --preset ${{ matrix.preset }} \
            --plat ${{ matrix.plat }} --version ${{ github.ref_name }} $extra
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.plat }}
          path: |
            dist/*.tar.xz
            dist/checksums-*.txt

  dist-windows:
    # Both Windows toolchains via `ci dist`: MSVC (x86_64 + arm64) and mingw
    # (x86_64, superbuild fetches winlibs GCC). The tool is bootstrapped with cl
    # (the same two sources the `ci` CMake target builds).
    name: ${{ matrix.plat }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { toolchain: msvc,  runner: windows-latest, arch: x64,   plat: windows-x86_64-msvc,  preset: dist-msvc }
          - { toolchain: msvc,  runner: windows-11-arm, arch: arm64, plat: windows-arm64-msvc,   preset: dist-msvc }
          - { toolchain: mingw, runner: windows-latest, arch: x64,   plat: windows-x86_64-mingw, preset: dist-mingw }
    steps:
      - uses: actions/checkout@v5
      - name: set up MSVC dev shell (cl for the ci bootstrap + mingw driver)
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.arch }}
      - name: install ninja
        if: matrix.toolchain == 'mingw'
        run: choco install ninja -y
      - name: build ci tool
        run: cl /nologo /O2 /Fe:ci.exe tools\ci.c tools\toolsupport.c
      - name: dist (configure + build + install + bench + package)
        run: .\ci.exe dist --preset ${{ matrix.preset }} --plat ${{ matrix.plat }} --version ${{ github.ref_name }}
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.plat }}
          path: |
            dist/*.zip
            dist/checksums-*.txt

  publish:
    name: publish release
    needs: [dist-unix, dist-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          path: dl
      - name: collect + combine checksums
        run: |
          set -eux
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          mkdir -p out
          find dl -type f ! -name 'checksums-*.txt' -exec cp {} out/ \;
          /tmp/mcc-ci sha256sums dl --out out/SHA256SUMS.txt
          ls -l out
      - name: publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
