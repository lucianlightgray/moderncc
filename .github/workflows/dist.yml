name: Dist

# Reusable dist pipeline: called by ci.yml (per-push packaging smoke, version
# ci-<sha12>) and release.yml (tagged bundles, version = the tag). The cell
# matrices come from the preset ledger via `ci plan --job dist-unix` /
# `--job dist-windows`, and every flow step is a `ci` tool verb.

on:
  workflow_call:
    inputs:
      version:
        description: Bundle version tag (empty = ci-<sha12>)
        type: string
        default: ''
        required: false
      bench:
        description: Run the compile-speed benchmark as part of dist (releases do; per-push smoke does not)
        type: boolean
        default: false
        required: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      unix: ${{ steps.gen.outputs.unix }}
      windows: ${{ steps.gen.outputs.windows }}
    steps:
      - uses: actions/checkout@v5
      - id: gen
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          echo "unix=$(/tmp/mcc-ci plan --job dist-unix)" >> "$GITHUB_OUTPUT"
          echo "windows=$(/tmp/mcc-ci plan --job dist-windows)" >> "$GITHUB_OUTPUT"

  unix:
    needs: plan
    name: ${{ matrix.plat }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.unix) }}
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build gcc clang
      - name: install Rosetta 2 (run x86_64 binaries on Apple silicon)
        if: matrix.rosetta
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: install toolchain (macos)
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja
      - name: dist (configure + build + install + strip + package; bench on release)
        # `ci dist` runs the whole flow (the macOS local-symbol strip is
        # folded in); Rosetta's cross flags pass through after `--`. The
        # compile-speed bench is skipped (--no-bench) unless inputs.bench.
        run: |
          set -eux
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c $([ "$RUNNER_OS" = Linux ] && echo -ldl)
          extra=""
          if [ "${{ matrix.rosetta }}" = "true" ]; then
            extra="-- -DCMAKE_OSX_ARCHITECTURES=x86_64 -DMCC_TARGET_ARCH=x86_64"
          fi
          /tmp/mcc-ci dist --preset ${{ matrix.preset }} --plat ${{ matrix.plat }} \
            --version "${VERSION:-ci-${GITHUB_SHA::12}}" \
            $([ "${{ inputs.bench }}" = true ] || echo --no-bench) $extra
      - name: benchmark summary
        if: ${{ inputs.bench }}
        run: /tmp/mcc-ci bench-summary --plat "${{ matrix.plat }}" --append "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: mcc-${{ matrix.plat }}
          path: |
            dist/*.tar.xz
            dist/checksums-*.txt
            dist/bench-*.txt

  windows:
    needs: plan
    name: ${{ matrix.plat }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.windows) }}
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: set up MSVC dev shell (cl for the ci bootstrap + mingw driver)
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.msvcarch }}
      - name: install ninja
        if: matrix.mingw
        run: choco install ninja -y
      - name: cache winlibs mingw toolchain (superbuild download target)
        if: matrix.mingw
        uses: actions/cache@v5
        with:
          path: vendor/winlibs-mingw-w64-*
          key: winlibs-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: winlibs-
      - name: dist (configure + build + install + package)
        run: |
          cl /nologo /O2 /Fe:ci.exe tools\ci.c tools\toolsupport.c
          if (-not $env:VERSION) { $env:VERSION = "ci-" + $env:GITHUB_SHA.Substring(0,12) }
          $bench = if ("${{ inputs.bench }}" -eq "true") { @() } else { ,"--no-bench" }
          .\ci.exe dist --preset ${{ matrix.preset }} --plat ${{ matrix.plat }} --version "$env:VERSION" @bench
      - name: benchmark summary
        if: ${{ inputs.bench }}
        run: .\ci.exe bench-summary --plat "${{ matrix.plat }}" --append "${env:GITHUB_STEP_SUMMARY}"
      - uses: actions/upload-artifact@v7
        with:
          name: mcc-${{ matrix.plat }}
          path: |
            dist/*.zip
            dist/checksums-*.txt
            dist/bench-*.txt
