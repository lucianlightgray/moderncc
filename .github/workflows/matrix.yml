name: Matrix

# Heavy, non-gating cells split out of the per-push/PR CI critical path onto a
# nightly trigger (they used to run per-push-to-main, but as non-gating checks
# they competed with the gating CI matrix for the shared concurrency cap). Two
# families:
#
#   matrix    - the toolchain superbuild: gcc;clang x native;cross x host-arch,
#               one build per cell (each overrides MCC_TOOLCHAIN_PROFILE /
#               MCC_TARGETS to a single profile x target) so the 2x2x2 = 8
#               builds run in parallel and each surfaces as its own job
#               instead of two ~40-min host superbuilds. Build-only smoke
#               (ci.yml already tests each toolchain).
#   macos-x86 - the emulated x86_64 macOS cells (build + test under Rosetta,
#               ~14 min each). These were the gating critical path; ci.yml now
#               gates only the native arm64 macOS cells.
#   fuzz-arm64- the differential random-program miscompile fuzzer (tests/fuzz)
#               run as a time-boxed `campaign` on real arm64 silicon
#               (ubuntu-24.04-arm). ci.yml already runs the small default fuzz
#               ctest band on the per-push x86_64 AND arm64 cells (the same
#               gcc+clang majority-vote oracle, now arch-portable); this cell
#               is the heavy nightly soak — a continuously-strengthening
#               weak-memory-model backstop for all arm64 codegen (TODO.md
#               cross-arch parity: "a linux-arm64 CI fuzz cell"). It is not the
#               x86-only shadow-IV oracle; that mechanism is unrelated.
#
# matrix/macos-x86 come from the same preset ledger as ci.yml
# (`ci plan --job matrix` / `--job macos-x86`), so `ci parity` still covers
# their presets. fuzz-arm64 reuses the existing `linux-gcc` preset build (no new
# preset) and then drives the fuzz_runner campaign subcommand directly, since a
# budgeted campaign is not a ctest and has no run-preset mapping. Never blocks a
# PR; also runnable on demand.

on:
  schedule:
    - cron: '47 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      macos: ${{ steps.gen.outputs.macos }}
    steps:
      - uses: actions/checkout@v5
      - id: gen
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          echo "matrix=$(/tmp/mcc-ci plan --job matrix)" >> "$GITHUB_OUTPUT"
          echo "macos=$(/tmp/mcc-ci plan --job macos-x86)" >> "$GITHUB_OUTPUT"

  matrix:
    needs: plan
    name: ${{ matrix.profile }} / ${{ matrix.target }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.profile }}-${{ matrix.target }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain (everything the platform offers)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential gcc clang lld wine64 git rsync \
            mingw-w64
      - name: run ${{ matrix.profile }} x ${{ matrix.target }} (single-cell build, build-only)
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          mkdir -p "dist/$ART"
          /tmp/mcc-ci run-preset ${{ matrix.preset }} --out "dist/$ART" --no-test \
            -DMCC_TOOLCHAIN_PROFILE=${{ matrix.profile }} -DMCC_TARGETS=${{ matrix.target }}
      - name: pack build targets
        run: tar cJf "$ART.tar.xz" -C dist "$ART"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: ${{ env.ART }}.tar.xz

  macos-x86:
    # The emulated x86_64 macOS cells (clang, native + cross), formerly gating
    # in ci.yml. Full configure + build + test under Rosetta, so they carry the
    # same coverage as the arm64 cells — just off the per-push critical path.
    needs: plan
    name: ${{ matrix.preset }} / ${{ matrix.cc }} / ${{ matrix.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.macos) }}
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.cc }}-${{ matrix.arch }}
      # The macos preset resolves its build compiler from $CC; the x86_64
      # cells are clang-only, so pin it (the gating arm64 job resolves CC in a
      # step because it also runs gcc cells).
      CC: clang
    steps:
      - uses: actions/checkout@v5
      - name: install Rosetta 2 (x86_64 build + tests under emulation)
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: cache Homebrew downloads (gcc bottle + deps)
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ runner.arch }}-cmake-ninja-gcc-mingw
      - name: install toolchain (everything the platform offers)
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja gcc
      - name: install mingw-w64 (PE reference compiler; conformance/diff3 oracle)
        continue-on-error: true
        run: brew install mingw-w64
      - name: install wine (drives pe-wine-conformance in macos-cross)
        continue-on-error: true
        run: HOMEBREW_CASK_OPTS=--no-quarantine brew install --cask wine-stable
      - name: run ${{ matrix.preset }} x86_64 under Rosetta (configure + build + test)
        # x86_64 cells are clang-only; the Rosetta translation lock serializes a
        # handful of arch-independent probes, so drop those (fully covered by the
        # native arm64 macOS and Linux cells).
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c
          export MCC_CI_CTEST_EXCLUDE='^(fuzz|ast|cst|diff3|preprocess)/|^cli/(symbol_type_func_object|response_file|macho_fat64_dylib)$'
          /tmp/mcc-ci run-preset ${{ matrix.preset }} --out "$PWD/dist/$ART" \
            "-DMCC_DIST_PLAT=$ART" -DCMAKE_OSX_ARCHITECTURES=x86_64 -DMCC_TARGET_ARCH=x86_64

  fuzz-arm64:
    # Native-arm64-Linux differential-fuzz soak (tests/fuzz). Runs on real arm64
    # silicon so it is a genuine weak-memory-model backstop (qemu is x86-TSO and
    # is excluded by the fuzz guard anyway). The fuzzer's oracle is a portable
    # gcc+clang majority vote (UBSan/ASan-gated) — no x86 asm, no shadow-IV — so
    # it runs unchanged on arm64. Build reuses the linux-gcc preset (build-only:
    # ci.yml already tests it), then drives the fuzz_runner `campaign`
    # subcommand, which is time-boxed by a wall-clock budget and a
    # no-new-class convergence rule, so runtime is bounded and it never blocks a
    # push. Non-gating: a fresh-seed campaign is a soak, not a pass/fail gate.
    name: fuzz / linux-arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain (gcc + clang differential-oracle references)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential gcc clang lld git rsync
      - name: resolve differential-oracle reference compilers (gcc + clang)
        run: |
          echo "MCC_DIFF3_GCC=$(command -v gcc)" >> "$GITHUB_ENV"
          echo "MCC_DIFF3_CLANG=$(command -v clang)" >> "$GITHUB_ENV"
      - name: build mcc + fuzz_runner (linux-gcc preset, build-only)
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          /tmp/mcc-ci run-preset linux-gcc --no-test
      - name: differential-fuzz campaign (native arm64, time-boxed)
        # Positional args mirror the ctest wiring: <mcc> <bdir> <idir> <corpus>
        # <work> <budget_secs> <batch> <stop_k>. 1800s budget keeps the cell well
        # under a nightly slot; stop_k=6 converges early once no new miscompile
        # class appears. --gates is implied by campaign (it sweeps MCC_AST_*).
        run: |
          B="$PWD/cmake-linux-gcc"
          mkdir -p "$B/fuzz-campaign-work"
          "$B/fuzz_runner" campaign \
            "$B/mcc" "$B" "$PWD/runtime/include" \
            "$PWD/tests/fuzz/corpus" "$B/fuzz-campaign-work" \
            1800 8 6 \
            --ref gcc "$MCC_DIFF3_GCC" --ref clang "$MCC_DIFF3_CLANG"
      - name: upload any graduated repros
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-arm64-repros
          path: |
            tests/fuzz/corpus/*.c
            cmake-linux-gcc/fuzz-campaign-work/**
          if-no-files-found: ignore
