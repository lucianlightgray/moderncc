name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  linux:
    name: ${{ matrix.preset }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { preset: linux-gcc,             arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-cross,       arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-clang,           arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-clang-cross,     arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-release,     arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-musl,        arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc,             arch: arm64,  runner: ubuntu-24.04-arm }
          - { preset: linux-gcc-cross,       arch: arm64,  runner: ubuntu-24.04-arm }
          - { preset: linux-clang-release,   arch: arm64,  runner: ubuntu-24.04-arm }
          - { preset: linux-gcc-musl,        arch: arm64,  runner: ubuntu-24.04-arm }
          - { preset: linux-gcc-static,          arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-multisource,   arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-asm-off,         arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-predefs-off,     arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-pie,             arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-dwarf,           arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-diagnostics,     arch: x86_64, runner: ubuntu-latest }
          - { preset: linux-gcc-sanitize,            arch: x86_64, runner: ubuntu-latest }
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential gcc clang lld wine64 git rsync
      - name: run ${{ matrix.preset }}
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          mkdir -p "dist/$ART"
          /tmp/mcc-ci run-preset ${{ matrix.preset }} --out "dist/$ART"
      - name: test summary
        if: always()
        run: |
          /tmp/mcc-ci junit-summary "cmake-${{ matrix.preset }}/ctest-junit.xml" \
            "${{ matrix.preset }} / ${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY" || true
      - name: pack build targets
        run: tar cJf "$ART.tar.xz" -C dist "$ART"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: ${{ env.ART }}.tar.xz

  macos:
    name: ${{ matrix.preset }} / ${{ matrix.cc }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { preset: macos,       cc: clang }
          - { preset: macos-cross, cc: clang }
          - { preset: macos,       cc: gcc }
          - { preset: macos-cross, cc: gcc }
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.cc }}-arm64
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja gcc
      - name: resolve compiler (CC for the preset)
        run: |
          if [ "${{ matrix.cc }}" = gcc ]; then
            g=$(ls "$(brew --prefix)"/bin/gcc-[0-9]* | sort -V | tail -1)
            echo "CC=$g" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
          fi
      - name: configure
        run: cmake --preset ${{ matrix.preset }} "-DCMAKE_INSTALL_PREFIX=$PWD/dist/$ART" -DMCC_BENCH=ON "-DMCC_DIST_PLAT=$ART"
      - name: build
        run: cmake --build --preset ${{ matrix.preset }} -j"$(sysctl -n hw.ncpu)"
      - name: test
        run: ctest --preset ${{ matrix.preset }} -j"$(sysctl -n hw.ncpu)" --output-junit "$PWD/cmake-${{ matrix.preset }}/bench-tests.xml"
      - name: benchmark
        if: always()
        run: |
          cmake --build --preset ${{ matrix.preset }} --target bench
          echo "### benchmark — $ART" >> "$GITHUB_STEP_SUMMARY"
          { echo '```'; cat dist/bench-*.txt 2>/dev/null || echo '(no report)'; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
      - name: install + pack build targets
        run: |
          cmake --install cmake-${{ matrix.preset }}
          tar cJf "$ART.tar.xz" -C dist "$ART"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: |
            ${{ env.ART }}.tar.xz
            dist/bench-*.txt

  msvc:
    name: msvc / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, runner: windows-latest }
          - { arch: arm64,  runner: windows-11-arm }
    env:
      ART: mcc-msvc-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v5
      - name: resolve diff3 reference compilers (mingw gcc + clang)
        continue-on-error: true
        shell: pwsh
        run: |
          $gcc   = (Get-Command gcc   -ErrorAction SilentlyContinue).Source
          $clang = (Get-Command clang -ErrorAction SilentlyContinue).Source
          if ($gcc)   { "MCC_DIFF3_GCC=$($gcc.Replace('\','/'))"     | Out-File -FilePath $env:GITHUB_ENV -Append }
          if ($clang) { "MCC_DIFF3_CLANG=$($clang.Replace('\','/'))" | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: configure
        run: cmake --preset msvc "-DCMAKE_INSTALL_PREFIX=$($PWD.Path.Replace('\','/'))/dist/${env:ART}" "-DMCC_BENCH=ON" "-DMCC_DIST_PLAT=${env:ART}"
      - name: build
        run: cmake --build --preset msvc -j
      - name: localize MSVC-arm64 mcc miscompile (O2 vs Od corruption rate)
        if: matrix.arch == 'arm64'
        continue-on-error: true
        run: |
          # The MSVC-arm64 miscompile of mcc's __thread emission is INTERMITTENT:
          # the same binary sometimes drops main / truncates a trampoline. A correct
          # arm64-win32 tls.s has exactly 6 `ret` and all four function labels, so
          # verdict per-compile on that, and loop N to get a corruption RATE. If /Od
          # drops the rate to 0, it is an MSVC optimizer bug -> targeted workaround.
          $N = 30
          $labels = @('__mcc_pthread_trampoline','__mcc_once_tramp','thread_func','main')
          function Is-Corrupt($out) {
            $rets = (Select-String -Path $out -Pattern '^\s*ret\s*$').Count
            $missing = @($labels | Where-Object { -not (Select-String -Path $out -Pattern ('^' + [regex]::Escape($_) + ':') -Quiet) })
            return (($rets -ne 6) -or ($missing.Count -ne 0))
          }
          function Corrupt-Rate($mcc, $bdir, $tag) {
            $corrupt = 0
            for ($i = 0; $i -lt $N; $i++) {
              $out = "tls-native-$tag-${env:ART}.s"   # keep the last one as artifact
              & $mcc "-B$bdir" -fno-diagnostics-show-caret -Iruntime/include -Itests/support -pthread -S tests/exec/features_c99_c11/tls.c -o $out 2>$null
              if (Is-Corrupt $out) { $corrupt++ }
            }
            Write-Host "===== $tag : $corrupt/$N CORRUPT ($mcc) ====="
          }
          # /O2 baseline (the normal Release build)
          $mccO2 = (Get-ChildItem -Recurse -Filter mcc.exe cmake-msvc | Where-Object { $_.FullName -notlike '*noopt*' } | Select-Object -First 1).FullName
          Corrupt-Rate $mccO2 cmake-msvc "O2"
          # /Od experiment: same source/toolchain, optimization off.
          cmake -S . -B cmake-msvc-noopt -DCMAKE_BUILD_TYPE=Release -DMCC_TOOLCHAIN_PROFILE=msvc -DMCC_NOOPT=ON "-DMCC_DIFF3_GCC=$env:MCC_DIFF3_GCC" "-DMCC_DIFF3_CLANG=$env:MCC_DIFF3_CLANG"
          cmake --build cmake-msvc-noopt --config Release --target mcc
          $mccOd = (Get-ChildItem -Recurse -Filter mcc.exe cmake-msvc-noopt | Select-Object -First 1).FullName
          Corrupt-Rate $mccOd cmake-msvc-noopt "Od"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tls-native-${{ matrix.arch }}
          path: tls-native-*.s
      - name: test
        # --timeout caps any single test: a hung test (e.g. a thread-contention
        # deadlock that only manifests on real arm64 silicon) is killed and named
        # in the log instead of stalling the whole job until it is cancelled.
        run: ctest --preset msvc -j ${env:NUMBER_OF_PROCESSORS} --timeout 300 --output-junit "cmake-msvc/bench-tests.xml"
      - name: benchmark
        if: always()
        run: |
          cmake --build --preset msvc --config Release --target bench
          Add-Content $env:GITHUB_STEP_SUMMARY "### benchmark - ${env:ART}"
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
          Get-Content dist/bench-*.txt | Add-Content $env:GITHUB_STEP_SUMMARY
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
      - name: install + pack build targets
        run: |
          cmake --install cmake-msvc --config Release
          tar cJf "${env:ART}.tar.xz" -C dist "${env:ART}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: |
            ${{ env.ART }}.tar.xz
            dist/bench-*.txt

  mingw:
    name: mingw / native
    runs-on: windows-latest
    env:
      ART: mcc-mingw-x86_64
    steps:
      - uses: actions/checkout@v5
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: install ninja
        run: choco install ninja -y
      - name: configure + build (superbuild fetches winlibs GCC)
        run: |
          cmake --preset mingw "-DCMAKE_INSTALL_PREFIX=$($PWD.Path.Replace('\','/'))/dist/${env:ART}" "-DMCC_BENCH=ON" "-DMCC_DIST_PLAT=${env:ART}"
          cmake --build --preset mingw -j
      - name: benchmark
        if: always()
        run: |
          cmake --build --preset mingw --target bench
          Add-Content $env:GITHUB_STEP_SUMMARY "### benchmark - ${env:ART}"
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
          Get-Content dist/bench-*.txt | Add-Content $env:GITHUB_STEP_SUMMARY
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
      - name: install + pack build targets
        run: |
          cmake --install cmake-mingw
          tar cJf "${env:ART}.tar.xz" -C dist "${env:ART}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: |
            ${{ env.ART }}.tar.xz
            dist/bench-*.txt

  qemu:
    # user-mode qemu exists only on Linux, so this runs natively on the ubuntu
    # runner (no Docker). One job per (arch x libc) cell keeps each run small
    # and fetches only that cell's Gentoo stage3 sysroot.
    name: qemu / ${{ matrix.arch }} / ${{ matrix.libc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, i386, arm, arm64, riscv64]
        libc: [glibc, musl]
    steps:
      - uses: actions/checkout@v5
      - name: install qemu-user + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build make git ca-certificates curl \
            qemu-user qemu-user-static tar xz-utils bzip2 rsync clang lld
      - name: cache stage3 sysroot
        uses: actions/cache@v5
        with:
          path: vendor/gentoo-stage3-*
          key: gentoo-stage3-${{ matrix.arch }}-${{ matrix.libc }}
      - name: run qemu-${{ matrix.arch }} / ${{ matrix.libc }}
        env:
          PRESET: qemu-${{ matrix.arch }}
          LIBCS: ${{ matrix.libc }}
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          /tmp/mcc-ci qemu
      - name: test summary
        if: always()
        run: |
          /tmp/mcc-ci junit-summary "cmake-qemu-${{ matrix.arch }}/ctest-junit.xml" \
            "qemu / ${{ matrix.arch }} / ${{ matrix.libc }}" >> "$GITHUB_STEP_SUMMARY" || true

  dist-matrix:
    runs-on: ubuntu-latest
    outputs:
      presets: ${{ steps.gen.outputs.presets }}
    steps:
      - uses: actions/checkout@v5
      - id: gen
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          echo "presets=$(/tmp/mcc-ci matrix --filter dist-linux --json)" >> "$GITHUB_OUTPUT"

  dist:
    needs: dist-matrix
    name: ${{ matrix.preset }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        preset: ${{ fromJSON(needs.dist-matrix.outputs.presets) }}
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build gcc clang
      - name: configure + build + install + package
        run: |
          set -eux
          cmake --preset ${{ matrix.preset }} \
            "-DMCC_DIST_VERSION=ci-${GITHUB_SHA::12}" "-DMCC_DIST_PLAT=${{ matrix.preset }}-${{ matrix.arch }}" \
            -DMCC_BENCH=ON
          cmake --build --preset ${{ matrix.preset }} -j"$(nproc)"
          cmake --install cmake-${{ matrix.preset }}
          cmake --build --preset ${{ matrix.preset }} --target bench
          cmake --build --preset ${{ matrix.preset }} --target package-dist
      - name: benchmark summary
        if: always()
        run: |
          echo "### benchmark — ${{ matrix.preset }}-${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
          { echo '```'; cat dist/bench-*.txt 2>/dev/null || echo '(no report)'; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: mcc-${{ matrix.preset }}-${{ matrix.arch }}
          path: |
            dist/*.tar.xz
            dist/checksums-*.txt
            dist/bench-*.txt

  dist-macos:
    name: dist-macos / ${{ matrix.arch }}
    # Both arches run on the Apple-silicon runner: arm64 natively, x86_64
    # cross-produced by the universal clang (-arch x86_64) and executed under
    # Rosetta 2 -- GitHub's Intel macos-13 image is being retired.
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v5
      - name: install Rosetta 2 (run x86_64 binaries on Apple silicon)
        if: matrix.arch == 'x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: install toolchain
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja
      - name: configure + build + install + package
        run: |
          set -eux
          extra=""
          if [ "${{ matrix.arch }}" = x86_64 ]; then
            extra="-DCMAKE_OSX_ARCHITECTURES=x86_64 -DMCC_TARGET_ARCH=x86_64"
          fi
          cmake --preset dist-macos \
            "-DMCC_DIST_VERSION=ci-${GITHUB_SHA::12}" "-DMCC_DIST_PLAT=dist-macos-${{ matrix.arch }}" \
            -DMCC_BENCH=ON $extra
          cmake --build --preset dist-macos -j"$(sysctl -n hw.ncpu)"
          cmake --install cmake-dist-macos
          cmake --build --preset dist-macos --target bench
          cmake --build --preset dist-macos --target package-dist
      - name: benchmark summary
        if: always()
        run: |
          echo "### benchmark — dist-macos-${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
          { echo '```'; cat dist/bench-*.txt 2>/dev/null || echo '(no report)'; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: mcc-dist-macos-${{ matrix.arch }}
          path: |
            dist/*.tar.xz
            dist/checksums-*.txt
            dist/bench-*.txt

  dist-windows:
    # Release dist packaging for Windows via the `ci dist` tool, both toolchains:
    # MSVC (x86_64 + arm64) and mingw (x86_64, superbuild fetches winlibs GCC).
    # The tool is bootstrapped with cl — the same two sources the `ci` CMake
    # target builds — so the whole dist flow lives in one place across platforms.
    name: dist-windows / ${{ matrix.plat }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { toolchain: msvc,  runner: windows-latest, arch: x64,   plat: windows-x86_64-msvc,  preset: dist-msvc }
          - { toolchain: msvc,  runner: windows-11-arm, arch: arm64, plat: windows-arm64-msvc,   preset: dist-msvc }
          - { toolchain: mingw, runner: windows-latest, arch: x64,   plat: windows-x86_64-mingw, preset: dist-mingw }
    steps:
      - uses: actions/checkout@v5
      - name: set up MSVC dev shell (cl for the ci bootstrap + mingw driver)
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.arch }}
      - name: install ninja
        if: matrix.toolchain == 'mingw'
        run: choco install ninja -y
      - name: build ci tool
        run: cl /nologo /O2 /Fe:ci.exe tools\ci.c tools\toolsupport.c
      - name: dist (configure + build + install + bench + package)
        run: .\ci.exe dist --preset ${{ matrix.preset }} --plat ${{ matrix.plat }} --version "ci-$($env:GITHUB_SHA.Substring(0,12))"
      - name: benchmark summary
        if: always()
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "### benchmark - ${{ matrix.plat }}"
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
          Get-Content dist/bench-*.txt | Add-Content $env:GITHUB_STEP_SUMMARY
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
      - uses: actions/upload-artifact@v7
        with:
          name: mcc-${{ matrix.plat }}
          path: |
            dist/*.zip
            dist/checksums-*.txt
            dist/bench-*.txt
