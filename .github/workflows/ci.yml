name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  plan:
    # Every job matrix below is generated from the preset ledger in
    # tools/ci.c (`ci plan --job <x>`), so the schedule has exactly one
    # source of truth, shared with `ci local` and checked by `ci parity`.
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.gen.outputs.linux }}
      macos: ${{ steps.gen.outputs.macos }}
      windows: ${{ steps.gen.outputs.windows }}
      qemu: ${{ steps.gen.outputs.qemu }}
    steps:
      - uses: actions/checkout@v5
      - id: gen
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          echo "linux=$(/tmp/mcc-ci plan --job linux)" >> "$GITHUB_OUTPUT"
          echo "macos=$(/tmp/mcc-ci plan --job macos)" >> "$GITHUB_OUTPUT"
          echo "windows=$(/tmp/mcc-ci plan --job windows)" >> "$GITHUB_OUTPUT"
          echo "qemu=$(/tmp/mcc-ci plan --job qemu)" >> "$GITHUB_OUTPUT"

  linux:
    needs: plan
    name: ${{ matrix.preset }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.linux) }}
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain (everything the platform offers)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential gcc clang lld wine64 git rsync \
            mingw-w64
      - name: run ${{ matrix.preset }}
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          mkdir -p "dist/$ART"
          /tmp/mcc-ci run-preset ${{ matrix.preset }} --out "dist/$ART" ${{ matrix.flags }}
      - name: test summary
        if: always()
        run: |
          /tmp/mcc-ci junit-summary "cmake-${{ matrix.preset }}/ctest-junit.xml" \
            "${{ matrix.preset }} / ${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY" || true
      - name: pack build targets
        run: tar cJf "$ART.tar.xz" -C dist "$ART"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: ${{ env.ART }}.tar.xz

  macos:
    needs: plan
    name: ${{ matrix.preset }} / ${{ matrix.cc }} / ${{ matrix.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.macos) }}
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.cc }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v5
      - name: install Rosetta 2 (x86_64 cells + x86_64 wine on Apple silicon)
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: cache Homebrew downloads (gcc bottle + deps)
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ runner.arch }}-cmake-ninja-gcc-mingw
      - name: install toolchain (everything the platform offers)
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja gcc
      - name: install mingw-w64 (PE reference compiler; conformance/diff3 oracle)
        continue-on-error: true
        run: brew install mingw-w64
      - name: install wine (drives pe-wine-conformance in macos-cross)
        continue-on-error: true
        run: HOMEBREW_CASK_OPTS=--no-quarantine brew install --cask wine-stable
      - name: resolve compiler (CC for the preset)
        run: |
          if [ "${{ matrix.cc }}" = gcc ]; then
            g=$(ls "$(brew --prefix)"/bin/gcc-[0-9]* | sort -V | tail -1)
            echo "CC=$g" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
          fi
      - name: run ${{ matrix.preset }} (configure + build + test + install)
        # The benchmark lives in its own workflow (bench.yml, push-to-main
        # only) so per-push/PR CI is not gated on a ~10-min compile-speed run.
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c
          extra=""
          if [ "${{ matrix.arch }}" = x86_64 ]; then
            extra="-DCMAKE_OSX_ARCHITECTURES=x86_64 -DMCC_TARGET_ARCH=x86_64"
            # The x86_64 cell runs under Rosetta; also drop the arch-independent
            # object-format cli probes (symbol typing / response file / fat64),
            # which serialize on the Rosetta translation lock for ~70s here yet
            # are fully covered by the native arm64 macOS and Linux cells.
            export MCC_CI_CTEST_EXCLUDE='^(fuzz|ast|cst|diff3|preprocess)/|^cli/(symbol_type_func_object|response_file|macho_fat64_dylib)$'
          fi
          /tmp/mcc-ci run-preset ${{ matrix.preset }} --out "$PWD/dist/$ART" \
            "-DMCC_DIST_PLAT=$ART" $extra
      - name: pack build targets
        run: tar cJf "$ART.tar.xz" -C dist "$ART"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: ${{ env.ART }}.tar.xz

  windows:
    # msvc and mingw are both Windows toolchains, so they share one job: the
    # matrix (`ci plan --job windows`) carries msvc cells (cl, VS generator,
    # native x86_64 + arm64) alongside mingw cells (winlibs GCC superbuild,
    # Ninja, x86_64 + i686), distinguished by matrix.mingw. Every cell runs
    # the full ctest suite and diffs mcc against whatever reference compilers
    # (gcc/clang) the image offers, so side-by-side coverage is maximal. The
    # 32-bit mingw cell is experimental (matrix.experimental), so it reports
    # but does not gate until i386-Windows codegen is proven green.
    needs: plan
    name: ${{ matrix.preset }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.windows) }}
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v5
      - name: set up MSVC dev shell (cl bootstraps the ci tool + mingw driver)
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.msvcarch }}
      - name: install ninja (mingw superbuild uses the Ninja generator)
        if: matrix.mingw
        run: choco install ninja -y
      - name: cache winlibs mingw toolchain (superbuild download target)
        if: matrix.mingw
        uses: actions/cache@v5
        with:
          path: vendor/winlibs-mingw-w64-*
          key: winlibs-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: winlibs-
      - name: resolve diff3 reference compilers (prefer preinstalled mingw gcc + clang)
        continue-on-error: true
        shell: pwsh
        run: |
          $gcc   = (Get-Command gcc   -ErrorAction SilentlyContinue).Source
          $clang = (Get-Command clang -ErrorAction SilentlyContinue).Source
          if ($gcc)   { "MCC_DIFF3_GCC=$($gcc.Replace('\','/'))"     | Out-File -FilePath $env:GITHUB_ENV -Append }
          if ($clang) { "MCC_DIFF3_CLANG=$($clang.Replace('\','/'))" | Out-File -FilePath $env:GITHUB_ENV -Append }
          if ($gcc -and $clang) { "MCC_DIFF3_READY=1" | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: install diff3 reference compilers (only if the image lacks gcc or clang)
        if: env.MCC_DIFF3_READY != '1'
        continue-on-error: true
        run: choco install -y llvm mingw
      - name: re-resolve diff3 reference compilers after install
        if: env.MCC_DIFF3_READY != '1'
        continue-on-error: true
        shell: pwsh
        run: |
          $gcc   = (Get-Command gcc   -ErrorAction SilentlyContinue).Source
          $clang = (Get-Command clang -ErrorAction SilentlyContinue).Source
          if ($gcc)   { "MCC_DIFF3_GCC=$($gcc.Replace('\','/'))"     | Out-File -FilePath $env:GITHUB_ENV -Append }
          if ($clang) { "MCC_DIFF3_CLANG=$($clang.Replace('\','/'))" | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: run ${{ matrix.preset }} (msvc - configure + build + test + install)
        if: ${{ !matrix.mingw }}
        # --timeout caps any single test: a hung test (e.g. a thread-contention
        # deadlock that only manifests on real arm64 silicon) is killed and named
        # in the log instead of stalling the whole job until it is cancelled.
        # Benchmark runs in bench.yml (push-to-main only), not here.
        run: |
          cl /nologo /O2 /Fe:ci.exe tools\ci.c tools\toolsupport.c
          .\ci.exe run-preset ${{ matrix.preset }} --config Release --out "$($PWD.Path.Replace('\','/'))/dist/${env:ART}" "-DMCC_DIST_PLAT=${env:ART}" -- --timeout 300
      - name: run ${{ matrix.preset }} (mingw superbuild - fetches winlibs GCC; each cell builds + ctest)
        if: matrix.mingw
        # --no-test suppresses only the empty top-level ctest; the winlibs cell
        # runs the full suite (and emits ctest-junit.xml) inside the superbuild.
        run: |
          cl /nologo /O2 /Fe:ci.exe tools\ci.c tools\toolsupport.c
          .\ci.exe run-preset mingw --no-test --out "$($PWD.Path.Replace('\','/'))/dist/${env:ART}" "-DMCC_DIST_PLAT=${env:ART}" "-DMCC_MINGW_ARCH=${{ matrix.arch }}"
      - name: test summary
        if: always()
        shell: pwsh
        run: |
          if (-not (Test-Path ci.exe)) { exit 0 }
          $xml = if ("${{ matrix.mingw }}" -eq "true") { "cmake-mingw/mingw-native/ctest-junit.xml" } else { "cmake-${{ matrix.preset }}/ctest-junit.xml" }
          .\ci.exe junit-summary "$xml" "${{ matrix.preset }} / ${{ matrix.arch }}" | Out-File -FilePath "${env:GITHUB_STEP_SUMMARY}" -Append -Encoding utf8
      - name: pack build targets
        run: tar cJf "${env:ART}.tar.xz" -C dist "${env:ART}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: ${{ env.ART }}.tar.xz

  qemu:
    # user-mode qemu exists only on Linux, so this runs natively on the ubuntu
    # runners (no Docker), on both host arches. One job per (host x batch),
    # where a batch runs its arches x {glibc,musl} in a single umbrella `qemu`
    # build: the emulated work per cell is tiny, so batching amortizes the
    # apt/checkout/cache setup that used to dominate 20 one-cell jobs. The
    # stage3 sysroots are target-side data, keyed by batch and shared across
    # hosts via the restore-key prefix.
    needs: plan
    name: qemu / ${{ matrix.host }} / ${{ matrix.label }}
    runs-on: ${{ matrix.host == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.qemu) }}
    steps:
      - uses: actions/checkout@v5
      - name: install qemu-user + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build make git ca-certificates curl \
            qemu-user qemu-user-static tar xz-utils bzip2 rsync clang lld
      - name: cache stage3 sysroot
        uses: actions/cache@v5
        with:
          path: vendor/gentoo-stage3-*
          key: gentoo-stage3-${{ matrix.batch }}
          restore-keys: gentoo-stage3-
      - name: run qemu batch ${{ matrix.batch }} (${{ matrix.label }})
        env:
          ARCHS: ${{ matrix.archs }}
          LIBCS: glibc;musl
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          /tmp/mcc-ci qemu
      - name: test summary
        if: always()
        run: |
          /tmp/mcc-ci junit-summary "cmake-qemu/ctest-junit.xml" \
            "qemu / ${{ matrix.host }} / ${{ matrix.label }}" >> "$GITHUB_STEP_SUMMARY" || true

  dist:
    # Shared dist pipeline (.github/workflows/dist.yml, also used by
    # release.yml); with no version input it stamps ci-<sha12>.
    uses: ./.github/workflows/dist.yml
