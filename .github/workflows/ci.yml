name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  linux:
    name: linux ${{ matrix.cc }}/${{ matrix.arch }}/${{ matrix.target }}/${{ matrix.build_type }}${{ matrix.musl == 'ON' && '/musl' || '' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cc: gcc,   arch: x86_64, target: native, build_type: Debug,   musl: 'OFF', runner: ubuntu-latest }
          - { cc: gcc,   arch: x86_64, target: cross,  build_type: Debug,   musl: 'OFF', runner: ubuntu-latest }
          - { cc: clang, arch: x86_64, target: native, build_type: Debug,   musl: 'OFF', runner: ubuntu-latest }
          - { cc: clang, arch: x86_64, target: cross,  build_type: Debug,   musl: 'OFF', runner: ubuntu-latest }
          - { cc: gcc,   arch: x86_64, target: native, build_type: Release, musl: 'OFF', runner: ubuntu-latest }
          - { cc: gcc,   arch: x86_64, target: native, build_type: Debug,   musl: 'ON',  runner: ubuntu-latest }
          - { cc: gcc,   arch: arm64,  target: native, build_type: Debug,   musl: 'OFF', runner: ubuntu-24.04-arm }
          - { cc: gcc,   arch: arm64,  target: cross,  build_type: Debug,   musl: 'OFF', runner: ubuntu-24.04-arm }
          - { cc: clang, arch: arm64,  target: native, build_type: Release, musl: 'OFF', runner: ubuntu-24.04-arm }
          - { cc: gcc,   arch: arm64,  target: native, build_type: Debug,   musl: 'ON',  runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v5
      - name: build CI runner image
        run: docker build -t mcc-ci tests/ci/docker
      - name: run
        run: |
          docker run --rm \
            -e CC=${{ matrix.cc }} \
            -e TARGET=${{ matrix.target }} \
            -e BUILD_TYPE=${{ matrix.build_type }} \
            -e MUSL=${{ matrix.musl }} \
            -v "$PWD:/work:ro" \
            mcc-ci

  macos:
    name: macos ${{ matrix.cc }} / ${{ matrix.target }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        cc: [clang, gcc]
        target: [native, cross]
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja gcc
      - name: resolve compiler
        id: cc
        run: |
          if [ "${{ matrix.cc }}" = gcc ]; then
            g=$(ls "$(brew --prefix)"/bin/gcc-[0-9]* | sort -V | tail -1)
            echo "path=$g" >> "$GITHUB_OUTPUT"
          else
            echo "path=clang" >> "$GITHUB_OUTPUT"
          fi
      - name: configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=${{ steps.cc.outputs.path }}
          ${{ matrix.target == 'cross' && '-DMCC_ENABLE_CROSS=ON' || '' }}
      - name: build
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"
      - name: test
        run: ctest --test-dir build -j"$(sysctl -n hw.ncpu)" --output-on-failure -LE "qemu|wine"

  windows-msvc:
    name: windows msvc / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, runner: windows-latest }
          - { arch: arm64,  runner: windows-11-arm }
    steps:
      - uses: actions/checkout@v5
      - name: resolve diff3 reference compilers (mingw gcc + clang)
        id: refs
        continue-on-error: true
        shell: pwsh
        run: |
          $gcc   = (Get-Command gcc   -ErrorAction SilentlyContinue).Source
          $clang = (Get-Command clang -ErrorAction SilentlyContinue).Source
          if ($gcc)   { "gcc=$($gcc.Replace('\','/'))"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append }
          if ($clang) { "clang=$($clang.Replace('\','/'))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append }
      - name: configure
        run: >
          cmake -S . -B build -DMCC_TOOLCHAIN_PROFILE=msvc -DCMAKE_BUILD_TYPE=Release
          "-DMCC_DIFF3_GCC=${{ steps.refs.outputs.gcc }}"
          "-DMCC_DIFF3_CLANG=${{ steps.refs.outputs.clang }}"
      - name: build
        run: cmake --build build --config Release -j
      - name: test
        run: ctest --test-dir build -C Release --output-on-failure -LE "qemu|wine|macho"

  windows-mingw:
    name: windows mingw / native
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: install ninja
        run: choco install ninja -y
      - name: configure + build (superbuild fetches winlibs GCC)
        run: |
          cmake -S . -B build -G Ninja -DMCC_TOOLCHAIN_PROFILE=mingw -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

  qemu-matrix:
    name: qemu ${{ matrix.arch }} (glibc+musl)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, i386, arm, arm64, riscv64]
    steps:
      - uses: actions/checkout@v5
      - name: build runner image
        run: docker build -t mcc-qemu tests/qemu/docker
      - name: run ${{ matrix.arch }} x {glibc,musl}
        run: |
          docker run --rm \
            -e ARCHS=${{ matrix.arch }} \
            -e LIBCS='glibc;musl' \
            -v "$PWD:/work:ro" \
            -v mcc-qemu-roots:/qemu-roots \
            mcc-qemu

  dist:
    name: dist mcc-${{ matrix.cc }}-linux-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cc: gcc,   arch: x86_64, runner: ubuntu-latest }
          - { cc: clang, arch: x86_64, runner: ubuntu-latest }
          - { cc: gcc,   arch: arm64,  runner: ubuntu-24.04-arm }
          - { cc: clang, arch: arm64,  runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build gcc clang
      - name: configure + build + install (release, static, stripped)
        run: |
          set -eux
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DMCC_BUILD_TESTS=OFF \
            -DMCC_BUILD_STATIC_EXE=ON \
            -DMCC_BUILD_STRIP=ON \
            -DMCC_CONFIG_BCHECK=OFF \
            -DMCC_CONFIG_BACKTRACE=OFF \
            -DMCC_BUILD_MUSL=ON \
            -DMCC_ENABLE_CROSS=ON \
            -DCMAKE_INSTALL_PREFIX="$PWD/stage"
          cmake --build build -j"$(nproc)"
          cmake --install build
      - uses: actions/upload-artifact@v7
        with:
          name: mcc-${{ matrix.cc }}-linux-${{ matrix.arch }}
          path: stage/bin/*
