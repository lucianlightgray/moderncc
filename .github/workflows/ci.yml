name: CI

















on:
  push:
  pull_request:
  workflow_dispatch:


concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  
  
  
  
  
  
  
  
  
  
  
  linux:
    name: linux ${{ matrix.cc }} / ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
        target: [native, cross]
    steps:
      - uses: actions/checkout@v5
      - name: build CI runner image
        run: docker build -t mcc-ci tests/ci/docker
      - name: run ${{ matrix.cc }} / ${{ matrix.target }}
        
        
        
        run: |
          docker run --rm \
            -e CC=${{ matrix.cc }} \
            -e TARGET=${{ matrix.target }} \
            -v "$PWD:/work:ro" \
            mcc-ci

  
  
  
  
  
  macos:
    name: macos ${{ matrix.cc }} / ${{ matrix.target }}
    
    
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        cc: [clang, gcc]
        target: [native, cross]
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain
        
        
        
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja gcc
      - name: resolve compiler
        id: cc
        
        run: |
          if [ "${{ matrix.cc }}" = gcc ]; then
            g=$(ls "$(brew --prefix)"/bin/gcc-[0-9]* | sort -V | tail -1)
            echo "path=$g" >> "$GITHUB_OUTPUT"
          else
            echo "path=clang" >> "$GITHUB_OUTPUT"
          fi
      - name: configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=${{ steps.cc.outputs.path }}
          ${{ matrix.target == 'cross' && '-DMCC_ENABLE_CROSS=ON' || '' }}
      - name: build
        run: cmake --build build -j"$(sysctl -n hw.ncpu)"
      - name: test
        
        run: ctest --test-dir build -j"$(sysctl -n hw.ncpu)" --output-on-failure -LE "qemu|wine"

  
  
  
  
  
  
  
  windows-msvc:
    name: windows msvc / native
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      
      
      
      
      
      
      
      - name: resolve diff3 reference compilers (mingw gcc + clang)
        id: refs
        shell: pwsh
        run: |
          # Normalize to forward slashes (what find_program yields) so the paths
          # survive the sh-driven runner without backslash-escaping surprises.
          $gcc   = (Get-Command gcc   -ErrorAction Stop).Source.Replace('\','/')
          $clang = (Get-Command clang -ErrorAction Stop).Source.Replace('\','/')
          "gcc=$gcc"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "clang=$clang" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "diff3 gcc  = $gcc"
          Write-Host "diff3 clang= $clang"
      - name: configure
        run: >
          cmake -S . -B build -DMCC_TOOLCHAIN_PROFILE=msvc -DCMAKE_BUILD_TYPE=Release
          "-DMCC_DIFF3_GCC=${{ steps.refs.outputs.gcc }}"
          "-DMCC_DIFF3_CLANG=${{ steps.refs.outputs.clang }}"
      - name: build
        run: cmake --build build --config Release -j
      - name: test
        run: ctest --test-dir build -C Release --output-on-failure -LE "qemu|wine|macho"

  windows-mingw:
    name: windows mingw / native
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      
      
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: install ninja
        run: choco install ninja -y
      - name: configure + build (superbuild fetches winlibs GCC)
        
        
        
        run: |
          cmake -S . -B build -G Ninja -DMCC_TOOLCHAIN_PROFILE=mingw -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j

  
  
  
  
  
  
  qemu-matrix:
    name: qemu ${{ matrix.arch }} (glibc+musl)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, i386, arm, arm64, riscv64]
    steps:
      - uses: actions/checkout@v5
      - name: build runner image
        run: docker build -t mcc-qemu tests/qemu/docker
      - name: run ${{ matrix.arch }} x {glibc,musl}
        run: |
          docker run --rm \
            -e ARCHS=${{ matrix.arch }} \
            -e LIBCS='glibc;musl' \
            -v "$PWD:/work:ro" \
            -v mcc-qemu-roots:/qemu-roots \
            mcc-qemu
