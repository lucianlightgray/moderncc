name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  plan:
    # Every job matrix below is generated from the preset ledger in
    # tools/ci.c (`ci plan --job <x>`), so the schedule has exactly one
    # source of truth, shared with `ci local` and checked by `ci parity`.
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.gen.outputs.linux }}
      macos: ${{ steps.gen.outputs.macos }}
      msvc: ${{ steps.gen.outputs.msvc }}
      qemu: ${{ steps.gen.outputs.qemu }}
    steps:
      - uses: actions/checkout@v5
      - id: gen
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          echo "linux=$(/tmp/mcc-ci plan --job linux)" >> "$GITHUB_OUTPUT"
          echo "macos=$(/tmp/mcc-ci plan --job macos)" >> "$GITHUB_OUTPUT"
          echo "msvc=$(/tmp/mcc-ci plan --job msvc)" >> "$GITHUB_OUTPUT"
          echo "qemu=$(/tmp/mcc-ci plan --job qemu)" >> "$GITHUB_OUTPUT"

  linux:
    needs: plan
    name: ${{ matrix.preset }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.linux) }}
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain (everything the platform offers)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential gcc clang lld wine64 git rsync \
            mingw-w64
      - name: run ${{ matrix.preset }}
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          mkdir -p "dist/$ART"
          /tmp/mcc-ci run-preset ${{ matrix.preset }} --out "dist/$ART" ${{ matrix.flags }}
      - name: test summary
        if: always()
        run: |
          /tmp/mcc-ci junit-summary "cmake-${{ matrix.preset }}/ctest-junit.xml" \
            "${{ matrix.preset }} / ${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY" || true
      - name: pack build targets
        run: tar cJf "$ART.tar.xz" -C dist "$ART"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: ${{ env.ART }}.tar.xz

  macos:
    needs: plan
    name: ${{ matrix.preset }} / ${{ matrix.cc }} / ${{ matrix.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.macos) }}
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.cc }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v5
      - name: install Rosetta 2 (x86_64 cells + x86_64 wine on Apple silicon)
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: install toolchain (everything the platform offers)
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja gcc
      - name: install wine (drives pe-wine-conformance in macos-cross)
        continue-on-error: true
        run: HOMEBREW_CASK_OPTS=--no-quarantine brew install --cask wine-stable
      - name: resolve compiler (CC for the preset)
        run: |
          if [ "${{ matrix.cc }}" = gcc ]; then
            g=$(ls "$(brew --prefix)"/bin/gcc-[0-9]* | sort -V | tail -1)
            echo "CC=$g" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
          fi
      - name: run ${{ matrix.preset }} (configure + build + test + bench + install)
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c
          extra=""
          if [ "${{ matrix.arch }}" = x86_64 ]; then
            extra="-DCMAKE_OSX_ARCHITECTURES=x86_64 -DMCC_TARGET_ARCH=x86_64"
            export MCC_CI_CTEST_EXCLUDE='^(fuzz|ast|cst|diff3|preprocess)/'
          fi
          /tmp/mcc-ci run-preset ${{ matrix.preset }} --out "$PWD/dist/$ART" --bench \
            -DMCC_BENCH=ON "-DMCC_DIST_PLAT=$ART" $extra
      - name: benchmark summary
        if: always()
        run: /tmp/mcc-ci bench-summary --plat "$ART" --append "$GITHUB_STEP_SUMMARY"
      - name: pack build targets
        run: tar cJf "$ART.tar.xz" -C dist "$ART"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: |
            ${{ env.ART }}.tar.xz
            dist/bench-*.txt

  msvc:
    needs: plan
    name: ${{ matrix.preset }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.msvc) }}
    env:
      ART: mcc-${{ matrix.preset }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v5
      - name: set up MSVC dev shell (cl bootstraps the ci tool)
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.msvcarch }}
      - name: resolve diff3 reference compilers (prefer preinstalled mingw gcc + clang)
        continue-on-error: true
        shell: pwsh
        run: |
          $gcc   = (Get-Command gcc   -ErrorAction SilentlyContinue).Source
          $clang = (Get-Command clang -ErrorAction SilentlyContinue).Source
          if ($gcc)   { "MCC_DIFF3_GCC=$($gcc.Replace('\','/'))"     | Out-File -FilePath $env:GITHUB_ENV -Append }
          if ($clang) { "MCC_DIFF3_CLANG=$($clang.Replace('\','/'))" | Out-File -FilePath $env:GITHUB_ENV -Append }
          if ($gcc -and $clang) { "MCC_DIFF3_READY=1" | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: install diff3 reference compilers (only if the image lacks gcc or clang)
        if: env.MCC_DIFF3_READY != '1'
        continue-on-error: true
        run: choco install -y llvm mingw
      - name: re-resolve diff3 reference compilers after install
        if: env.MCC_DIFF3_READY != '1'
        continue-on-error: true
        shell: pwsh
        run: |
          $gcc   = (Get-Command gcc   -ErrorAction SilentlyContinue).Source
          $clang = (Get-Command clang -ErrorAction SilentlyContinue).Source
          if ($gcc)   { "MCC_DIFF3_GCC=$($gcc.Replace('\','/'))"     | Out-File -FilePath $env:GITHUB_ENV -Append }
          if ($clang) { "MCC_DIFF3_CLANG=$($clang.Replace('\','/'))" | Out-File -FilePath $env:GITHUB_ENV -Append }
      - name: run ${{ matrix.preset }} (configure + build + test + bench + install)
        # --timeout caps any single test: a hung test (e.g. a thread-contention
        # deadlock that only manifests on real arm64 silicon) is killed and named
        # in the log instead of stalling the whole job until it is cancelled.
        run: |
          cl /nologo /O2 /Fe:ci.exe tools\ci.c tools\toolsupport.c
          .\ci.exe run-preset ${{ matrix.preset }} --config Release --out "$($PWD.Path.Replace('\','/'))/dist/${env:ART}" --bench "-DMCC_BENCH=ON" "-DMCC_DIST_PLAT=${env:ART}" -- --timeout 300
      - name: benchmark summary
        if: always()
        run: .\ci.exe bench-summary --plat ${env:ART} --append "${env:GITHUB_STEP_SUMMARY}"
      - name: pack build targets
        run: tar cJf "${env:ART}.tar.xz" -C dist "${env:ART}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: |
            ${{ env.ART }}.tar.xz
            dist/bench-*.txt

  mingw:
    name: mingw / native
    runs-on: windows-latest
    env:
      ART: mcc-mingw-x86_64
    steps:
      - uses: actions/checkout@v5
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: install ninja
        run: choco install ninja -y
      - name: run mingw (superbuild fetches winlibs GCC; cells ctest while building)
        run: |
          cl /nologo /O2 /Fe:ci.exe tools\ci.c tools\toolsupport.c
          .\ci.exe run-preset mingw --no-test --out "$($PWD.Path.Replace('\','/'))/dist/${env:ART}" --bench "-DMCC_BENCH=ON" "-DMCC_DIST_PLAT=${env:ART}"
      - name: benchmark summary
        if: always()
        run: .\ci.exe bench-summary --plat ${env:ART} --append "${env:GITHUB_STEP_SUMMARY}"
      - name: pack build targets
        run: tar cJf "${env:ART}.tar.xz" -C dist "${env:ART}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ART }}
          path: |
            ${{ env.ART }}.tar.xz
            dist/bench-*.txt

  qemu:
    # user-mode qemu exists only on Linux, so this runs natively on the ubuntu
    # runners (no Docker), on both host arches. One job per (host x arch x
    # libc) cell keeps each run small and fetches only that cell's Gentoo
    # stage3 sysroot (target-side data, so the cache is shared across hosts).
    needs: plan
    name: qemu / ${{ matrix.host }} / ${{ matrix.arch }} / ${{ matrix.libc }}
    runs-on: ${{ matrix.host == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.qemu) }}
    steps:
      - uses: actions/checkout@v5
      - name: install qemu-user + toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build make git ca-certificates curl \
            qemu-user qemu-user-static tar xz-utils bzip2 rsync clang lld
      - name: cache stage3 sysroot
        uses: actions/cache@v5
        with:
          path: vendor/gentoo-stage3-*
          key: gentoo-stage3-${{ matrix.arch }}-${{ matrix.libc }}
      - name: run qemu-${{ matrix.arch }} / ${{ matrix.libc }}
        env:
          PRESET: ${{ matrix.preset }}
          LIBCS: ${{ matrix.libc }}
        run: |
          cc -O2 -o /tmp/mcc-ci tools/ci.c tools/toolsupport.c -ldl
          /tmp/mcc-ci qemu
      - name: test summary
        if: always()
        run: |
          /tmp/mcc-ci junit-summary "cmake-qemu-${{ matrix.arch }}/ctest-junit.xml" \
            "qemu / ${{ matrix.host }} / ${{ matrix.arch }} / ${{ matrix.libc }}" >> "$GITHUB_STEP_SUMMARY" || true

  dist:
    # Shared dist pipeline (.github/workflows/dist.yml, also used by
    # release.yml); with no version input it stamps ci-<sha12>.
    uses: ./.github/workflows/dist.yml
