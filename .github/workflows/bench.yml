name: Bench

# Compile-speed benchmark (self-hosted mcc per -O level vs gcc/clang/mingw/msvc
# via mccbench). Split out of the per-push/PR CI matrix — where it was ~50% of
# every macOS/MSVC/mingw job's wall-clock and gated the critical path — into its
# own nightly trigger. One representative native cell per OS family, generated
# from the same preset ledger as ci.yml (`ci plan --job bench`), so the
# reference compilers (gcc+clang+mingw on Linux, clang+gcc on macOS, msvc on
# Windows) are covered without re-running the whole build matrix. Non-gating (it
# competed with the gating CI matrix for the shared runner-concurrency cap when
# it ran per-push-to-main). Also runnable on demand.

on:
  schedule:
    - cron: '31 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      bench: ${{ steps.gen.outputs.bench }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/ci
      - id: gen
        run: echo "bench=$(mcc-ci plan --job bench)" >> "$GITHUB_OUTPUT"

  bench:
    needs: plan
    name: bench / ${{ matrix.plat }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.bench) }}
    # The macos preset resolves its build compiler from $CC (the bench cell pins
    # it to clang); the linux/windows presets pin their own compiler, so an
    # empty CC there is harmless.
    env:
      CC: ${{ matrix.cc }}
    # cl is on PATH via setup-msvc-dev (exported to the job env), so the Windows
    # cell drives the MSVC build from the same bash step as the others.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - name: install toolchain (linux - gcc + clang + mingw references)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential gcc clang lld mingw-w64
      - name: cache Homebrew downloads (gcc bottle + deps)
        if: runner.os == 'macOS'
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.os }}-${{ runner.arch }}-cmake-ninja-gcc
      - name: install toolchain (macos - clang native + gcc reference)
        if: runner.os == 'macOS'
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install cmake ninja gcc
      - name: set up MSVC dev shell (cl reference + ci bootstrap)
        if: runner.os == 'Windows'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.msvcarch }}
      - uses: ./.github/actions/ci
      - name: build + benchmark (${{ matrix.preset }})
        run: |
          mcc-ci run-preset ${{ matrix.preset }} --no-test --bench \
            ${{ runner.os == 'Windows' && '--config Release' || '' }} \
            -DMCC_BENCH=ON -DMCC_DIST_PLAT=${{ matrix.plat }}
      - name: benchmark summary
        if: always()
        run: mcc-ci bench-summary --plat ${{ matrix.plat }} --append "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: bench-${{ matrix.plat }}
          path: dist/bench-*.txt
          if-no-files-found: ignore
